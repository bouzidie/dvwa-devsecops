# ========================================
# SonarQube Configuration for DVWA
# ========================================

# Project identification
sonar.projectKey=dvwa
sonar.projectName=DVWA - Damn Vulnerable Web Application
sonar.projectVersion=1.0
sonar.projectDescription=DVWA with DevSecOps Pipeline

# Source code
sonar.sources=.

# Exclusions
sonar.exclusions=**/*test*,**/*Test*,**/tests/**,vendor/**,node_modules/**,docker-stack/**,.github/**,coverage/**,*.min.js,**/*.min.php

# Language
sonar.language=php

# Quality profiles
sonar.qualityProfiles=Sonar way

# Quality gate
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8

