# .github/workflows/stage4-security-scan.yml

name: "Stage 4: Security Scan - Trivy"

on:
  workflow_run:
    workflows: ["Stage 3: Build Docker Image"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  trivy-scan:
    name: "🛡️ Trivy Security Scan"
    runs-on: self-hosted
    
    steps:
      - name: "Step 1️⃣: Checkout"
        uses: actions/checkout@v4

      # 🔐 OPTION A: Vault (commenté pour debug)
      # - name: "Step 2️⃣: Get Credentials from Vault"
      #   uses: hashicorp/vault-action@v2
      #   with:
      #     url: ${{ secrets.VAULT_ADDR2 }}
      #     token: ${{ secrets.VAULT_TOKEN2 }}
      #     method: token
      #     exportEnv: true
      #     tlsSkipVerify: true
      #     secrets: |
      #       secret/data/dvwa/registry username | GHCR_USERNAME ;
      #       secret/data/dvwa/registry password | GHCR_TOKEN ;

      # ✅ OPTION B: Secrets GitHub Direct (TEMPORAIRE)
      - name: "Step 2️⃣: Get GHCR Credentials (Direct)"
        run: |
          echo "GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}" >> $GITHUB_ENV
          echo "GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}" >> $GITHUB_ENV

      - name: "Step 3️⃣: Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: "Step 4️⃣: Pull Image"
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/dvwa-devsecops:latest"
          docker pull $IMAGE
          echo "IMAGE_NAME=$IMAGE" >> $GITHUB_ENV

      - name: "Step 5️⃣: Run Trivy Scanner"
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            --vuln-type os,library \
            --scanners vuln,secret,config \
            --timeout 15m \
            ${{ env.IMAGE_NAME }}
        continue-on-error: true

      - name: "Step 6️⃣: Upload to GitHub Security"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-security-scan'
