# ============================================
# WORKFLOW: Stage 3 - Build Docker Image 
# ============================================

name: "Stage 3: Build Docker Image"

on:
  workflow_run:
    workflows: ["Stage 2: Dependencies - Snyk Scan"]
    types: [completed]
  workflow_dispatch:  # Permet de lancer manuellement

# ✅ Permissions requises pour GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    name: "🐳 Build Docker Image"
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      # ─────────────────────────────────────
      # STEP 1: Checkout du code
      # ─────────────────────────────────────
      - name: "Step 1️⃣: Checkout Repository"
        uses: actions/checkout@v4

      # ─────────────────────────────────────
      # STEP 2: Récupérer les credentials depuis Vault
      # ─────────────────────────────────────
      - name: "Step 2️⃣: Get Docker Credentials from Vault"
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          method: token
          secrets: |
            secret/data/dvwa/registry username | GHCR_USERNAME ;
            secret/data/dvwa/registry password | GHCR_TOKEN ;
          exportEnv: true

      # ─────────────────────────────────────
      # STEP 3: Setup Docker Buildx
      # ─────────────────────────────────────
      - name: "Step 3️⃣: Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────
      # STEP 4: Login to GitHub Container Registry
      # ─────────────────────────────────────
      - name: "Step 4️⃣: Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      # ─────────────────────────────────────
      # STEP 5: Extraire les métadonnées
      # ─────────────────────────────────────
      - name: "Step 5️⃣: Extract Metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dvwa-devsecops
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ─────────────────────────────────────
      # STEP 6: Build et Push de l'image
      # ─────────────────────────────────────
      - name: "Step 6️⃣: Build and Push Image"
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────
      # STEP 7: Résumé du build
      # ─────────────────────────────────────
      - name: "Step 7️⃣: Build Summary"
        run: |
          echo "## 🐳 Docker Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Image: ghcr.io/${{ github.repository_owner }}/dvwa-devsecops" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Voir l'image: https://github.com/${{ github.repository_owner }}/pkgs/container/dvwa-devsecops" >> $GITHUB_STEP_SUMMARY
