name: "Stage 3: Build Docker Image"

on:
  workflow_run:
    workflows: ["Stage 2: Dependencies - Snyk Scan"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Vault (APP SECRETS UNIQUEMENT)
      - name: Retrieve App Secrets from Vault
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/dvwa/app DB_PASSWORD | DB_PASSWORD ;
            secret/data/dvwa/app API_KEY | API_KEY ;
          exportEnv: true

      # 3. Vault (GHCR credentials PAT)
      - name: Retrieve Registry Secrets from Vault
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/dvwa/registry username | REGISTRY_USER ;
            secret/data/dvwa/registry password | REGISTRY_PASS ;
          exportEnv: true

      # 4. Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASS }}

      # 6. Metadata
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dvwa-devsecops
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # 7. Build & Push
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            DB_PASSWORD=${{ env.DB_PASSWORD }}
            API_KEY=${{ env.API_KEY }}

      # 8. Summary
      - name: Build Summary
        run: |
          echo "✅ Build & Push completed"
          echo "Image: ghcr.io/${{ github.repository_owner }}/dvwa-devsecops"
